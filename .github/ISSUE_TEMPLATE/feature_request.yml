name: Feature request
description: Suggest an improvement or new MCP capability.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What workflow or limitation are you trying to improve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior or new tool.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include Agda examples, MCP call patterns, or extension use cases if relevant.
