name: "Copilot Setup Steps"

# Configures the environment for the GitHub Copilot coding agent.
# This gives Copilot access to Agda so it can run integration tests,
# use the MCP server live, and validate Agda-dependent changes.

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Agda
        uses: wenkokke/setup-agda@13475d93b4fdb4a49c1c22f680be2f2e6b279daf # v2
        with:
          agda-version: "2.7.0.1"
          agda-stdlib-version: "2.1.1"

      - name: Verify Agda is available
        run: agda --version

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
